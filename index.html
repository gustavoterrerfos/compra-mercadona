<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Compra Mercadona</title>
  <meta name="theme-color" content="#2b7a78" />
  <style>
    :root{
      --bg:#f4f7f7;
      --card:#ffffff;
      --text:#17252a;
      --muted:#6b7b83;
      --line:#dde7e7;
      --primary:#2b7a78;
      --primary-dark:#205e5d;
      --ok:#e7f7ef;
      --review:#fff3d9;
      --buy:#ffe5e5;
      --shadow:0 10px 24px rgba(23,37,42,.08);
      --radius:22px;
    }
    *{box-sizing:border-box}
    html,body{
      margin:0;padding:0;background:var(--bg);color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,Arial,sans-serif;
    }
    body{padding:14px}
    .wrap{max-width:1100px;margin:0 auto;padding-bottom:90px}
    .card{
      background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
      box-shadow:var(--shadow);padding:16px;margin-bottom:14px;
    }
    .title{font-size:18px;font-weight:700;margin:0 0 12px}
    .small{font-size:12px;color:var(--muted)}
    .hint{font-size:13px;color:var(--muted)}
    .stack{display:grid;gap:10px}
    .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
    input, select, button, textarea{
      width:100%;border:1px solid var(--line);background:white;border-radius:16px;
      padding:13px 14px;font:inherit;color:var(--text);
    }
    textarea{min-height:160px;resize:vertical}
    button{cursor:pointer;font-weight:700;transition:.15s ease}
    button:active{transform:scale(.99)}
    button:disabled{opacity:.55;cursor:not-allowed}
    .btn-primary{background:var(--primary);color:white;border-color:var(--primary)}
    .btn-primary:hover{background:var(--primary-dark)}
    .btn-buy{background:#fff0f0}
    .btn-soft{background:#f8fbfb}
    .chips{display:flex;flex-wrap:wrap;gap:8px}
    .chip{
      padding:7px 11px;border-radius:999px;border:1px solid var(--line);
      font-size:12px;background:#fff;
    }
    .chip.ok{background:var(--ok)}
    .chip.review{background:var(--review)}
    .chip.buy{background:var(--buy)}
    .shopping-groups{display:grid;gap:12px}
    .group-card{
      background:white;border:1px solid var(--line);border-radius:20px;
      box-shadow:var(--shadow);overflow:hidden;
    }
    .group-head{
      padding:14px 16px;font-weight:800;background:#f8fbfb;border-bottom:1px solid var(--line)
    }
    .shop-row{
      display:grid;grid-template-columns:1fr auto;gap:12px;align-items:center;
      padding:12px 16px;border-bottom:1px solid #eef4f4;
    }
    .shop-row:last-child{border-bottom:none}
    .shop-name{font-weight:600}
    .shop-state{font-size:12px;color:var(--muted);margin-top:4px}
    .catalog{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
.item-card{
  background:white;border:1px solid var(--line);border-radius:20px;
  box-shadow:var(--shadow);padding:12px 14px;cursor:pointer;
}

.item-name{
  font-size:16px;
  font-weight:800;
  margin:0;
}
    .item-name.ok{ color:#166534; }
    .item-name.buy{ color:#b91c1c; }
    .item-name.review{ color:#b45309; }
    .item-actions{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
    .item-actions button{width:auto;padding:10px 12px;cursor:pointer}
    .statusline{margin-top:8px;font-size:13px;min-height:18px;color:var(--muted)}
    .okmsg{color:#166534}
    .errmsg{color:#b91c1c}
    .empty{
      background:white;border:1px dashed var(--line);border-radius:18px;
      padding:24px;text-align:center;color:var(--muted);
    }
    .suggestions{display:grid;gap:6px;margin-top:8px}
    .suggestion{
      background:#f4fbfb;border:1px solid #d9ecec;border-radius:14px;
      padding:9px 12px;cursor:pointer;color:var(--primary-dark);font-size:13px;
    }
    a.link{color:var(--primary-dark);text-decoration:none}
    .tab-panel{display:none}
    .tab-panel.active{display:block}
    .toolbar{display:grid;grid-template-columns:1fr auto;gap:10px}
    .toolbar button{width:auto;min-width:110px}
    details{
      border:1px solid var(--line);border-radius:16px;padding:10px 12px;background:#fbfdfd;
    }
    summary{cursor:pointer;font-weight:700;outline:none}
    .searchbar{margin-bottom:12px}
    .bottom-tabs{
      position:fixed;left:50%;bottom:12px;transform:translateX(-50%);
      width:min(720px, calc(100% - 24px));display:grid;grid-template-columns:repeat(4,1fr);
      gap:8px;padding:8px;background:rgba(255,255,255,.92);backdrop-filter:blur(12px);
      border:1px solid var(--line);border-radius:18px;box-shadow:0 10px 30px rgba(23,37,42,.12);
      z-index:100;
    }
    .bottom-tab{
      border-radius:12px;background:transparent;border:1px solid transparent;
      padding:10px 8px;font-weight:700;color:var(--muted);
    }
    .bottom-tab.active{background:var(--primary);color:white;border-color:var(--primary)}
    .modal-backdrop{
      position:fixed;inset:0;background:rgba(15,23,42,.35);display:none;
      align-items:center;justify-content:center;padding:16px;z-index:200;
    }
    .modal-backdrop.open{display:flex}
    .modal{
      width:min(700px, 100%);max-height:90vh;overflow:auto;background:#fff;border:1px solid var(--line);
      border-radius:24px;box-shadow:0 20px 50px rgba(15,23,42,.18);padding:18px;
    }
    .modal-head{
      display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:12px;
    }
    .modal-title{font-size:20px;font-weight:800;margin:0}
    .modal-actions{display:flex;flex-wrap:wrap;gap:10px;margin-top:14px}
    .modal-actions button{width:auto}
    @media (max-width: 860px){
      .grid2,.grid3,.catalog,.toolbar{grid-template-columns:1fr}
      .shop-row{grid-template-columns:1fr}
      .item-actions button,.modal-actions button{width:100%}
    }
    .house-bar{
  display:grid;
  grid-template-columns:auto 1fr auto;
  gap:8px;
  align-items:center;
  margin-bottom:12px;
}

.house-label{
  font-size:13px;
  color:var(--muted);
  font-weight:700;
}

#activeHouse{
  padding:10px 12px;
  border-radius:12px;
}

.house-add{
  width:auto;
  min-width:44px;
  padding:10px 12px;
  border-radius:12px;
}
  </style>
</head>
<body>
  <div class="wrap">

<div class="house-bar">
  <div class="house-label">Casa</div>
  <select id="activeHouse" onchange="changeHouse()"></select>
  <button class="btn-soft house-add" onclick="createHouse()">+</button>
</div>

<section id="tab-comprar" class="tab-panel active">
  <div id="shopping" class="shopping-groups"></div>
</section>

    <section id="tab-productos" class="tab-panel">
      <div class="card">
        <div class="title">Todos los productos</div>
        <div class="grid2">
          <input id="searchProducts" placeholder="Buscar producto..." oninput="render()" />
          <select id="filterCategory" onchange="render()">
            <option value="">Todas las categorías</option>
          </select>
      </div>
        <div id="all" class="catalog"></div>
      </div>
    </section>

    <section id="tab-anadir" class="tab-panel">
      <div class="card">
        <div class="title">Añadir producto</div>
        <div class="grid2">
          <div>
            <input id="name" placeholder="Nombre del producto" />
            <div id="suggestions" class="suggestions"></div>
          </div>
          <div>
            <input id="category" list="categoryList" placeholder="Categoría" />
            <datalist id="categoryList"></datalist>
          </div>
        </div>

        <div class="grid2" style="margin-top:10px;">
          <input id="days" type="number" placeholder="Duración estimada en días" />
          <input id="murl" placeholder="Link de Mercadona (opcional)" />
        </div>

        <div style="margin-top:10px;">
          <button class="btn-primary" onclick="addItem()">Guardar producto</button>
        </div>
      </div>
    </section>

    <section id="tab-ajustes" class="tab-panel">
      <div class="card">
        <div class="title">Conexión</div>
        <div class="stack">
          <input id="endpoint" value="https://script.google.com/macros/s/AKfycbzi6WZp6g42qZOmQUcH22ro7lwQw5vp2Jy4rWo_fIEKKXLSjKy-CeyhWhAR7sMq6Woy8Q/exec" readonly />
          <div class="grid2">
            <button class="btn-primary" onclick="loadItems(true)">Sincronizar</button>
            <button class="btn-soft" onclick="copyUrl()">Copiar URL</button>
          </div>
        </div>
        <div class="statusline" id="status"></div>
      </div>

      <div class="card">
        <details>
          <summary>Carga masiva</summary>
          <div style="margin-top:12px;">
            <div class="small">Formato simple: una línea = un producto</div>
            <div class="small" style="margin-bottom:8px;">Formato avanzado: nombre | categoría | días | url</div>
            <textarea id="bulkText" placeholder="Leche entera&#10;Huevos&#10;&#10;o bien:&#10;Leche entera | Lácteos | 5 |"></textarea>
            <div class="grid2" style="margin-top:10px;">
              <button class="btn-primary" onclick="bulkImport()">Importar líneas</button>
              <button class="btn-soft" onclick="document.getElementById('bulkText').value=''">Limpiar</button>
            </div>
          </div>
        </details>
      </div>
    </section>

  </div>

  <div class="bottom-tabs">
    <button class="bottom-tab active" data-tab="comprar" onclick="showTab('comprar')">Comprar</button>
    <button class="bottom-tab" data-tab="productos" onclick="showTab('productos')">Productos</button>
    <button class="bottom-tab" data-tab="anadir" onclick="showTab('anadir')">Añadir</button>
    <button class="bottom-tab" data-tab="ajustes" onclick="showTab('ajustes')">Ajustes</button>
  </div>

  <div id="editModalBackdrop" class="modal-backdrop" onclick="closeEditModal(event)">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-head">
        <h3 class="modal-title">Editar producto</h3>
        <button class="btn-soft" style="width:auto;" onclick="forceCloseEditModal()">Cerrar</button>
      </div>

      <div class="grid2">
        <input id="editName" placeholder="Nombre" />
        <input id="editCategory" list="categoryList" placeholder="Categoría" />
      </div>

      <div class="grid2" style="margin-top:10px;">
        <input id="editDays" type="number" placeholder="Duración estimada en días" />
        <input id="editUrl" placeholder="Link de Mercadona" />
      </div>

      <div class="grid2" style="margin-top:10px;">
        <select id="editHouse"></select>
        <input id="editStatusReadonly" readonly />
      </div>

      <div class="chips" style="margin-top:12px;" id="editStatusInfo"></div>

      <div class="modal-actions">
        <button class="btn-primary" onclick="saveEdit()">Guardar cambios</button>
        <button class="btn-soft" onclick="markBoughtFromEdit()">Marcar comprado</button>
        <button class="btn-buy" onclick="markNeedFromEdit()">Marcar comprar</button>
        <button class="btn-soft" onclick="deleteFromEdit()">Borrar producto</button>
      </div>
    </div>
  </div>

<script>
const ENDPOINT = "https://script.google.com/macros/s/AKfycbzi6WZp6g42qZOmQUcH22ro7lwQw5vp2Jy4rWo_fIEKKXLSjKy-CeyhWhAR7sMq6Woy8Q/exec";
const CACHE_KEY = "mercadona_items_cache_multihouse_v1";
const SYNC_KEY = "mercadona_last_sync_multihouse_v1";
const ACTIVE_HOUSE_KEY = "mercadona_active_house_v1";
const HOUSES_KEY = "mercadona_houses_v1";
  
let items = [];
let editingId = null;
let activeHouse = "Casa";

const CATEGORY_ORDER = [
  "Fruta","Verdura","Fruta y verdura","Panadería","Carnicería","Carne","Charcutería",
  "Pescado","Lácteos","Huevos","Despensa","Congelados","Bebidas","Hogar","Limpieza","Otros"
];

function qs(id){ return document.getElementById(id); }

function showTab(tabName){
  document.querySelectorAll(".tab-panel").forEach(el => el.classList.remove("active"));
  document.querySelectorAll(".bottom-tab").forEach(el => el.classList.remove("active"));
  qs("tab-" + tabName).classList.add("active");
  document.querySelector(`.bottom-tab[data-tab="${tabName}"]`).classList.add("active");
}

function setStatusMessage(text, type = ""){
  const el = qs("status");
  el.textContent = text || "";
  el.className = "statusline" + (type === "ok" ? " okmsg" : type === "error" ? " errmsg" : "");
}

function formatDate(v){
  if(!v) return "—";
  const d = new Date(v);
  return isNaN(d) ? v : d.toLocaleDateString("es-ES");
}

function todayStr(){
  return new Date().toISOString().slice(0,10);
}

function esc(s){
  return (s || "").replace(/[&<>"']/g, m => ({
    "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"
  }[m]));
}

function copyUrl(){
  navigator.clipboard.writeText(ENDPOINT);
  setStatusMessage("URL copiada.", "ok");
}

function normalizeItem(x){
  return {
    id: String(x.id || ""),
    house: String(x.house || "Casa"),
    name: String(x.name || ""),
    category: String(x.category || ""),
    status: String(x.status || "OK").trim(),
    lastBought: x.lastBought || "",
    durationDays: Number(x.durationDays || 0),
    mercadonaUrl: String(x.mercadonaUrl || ""),
    updatedAt: x.updatedAt || ""
  };
}

function getHouses(){
  const fromItems = [...new Set(items.map(x => (x.house || "Casa").trim()).filter(Boolean))];
  const fromStorage = JSON.parse(localStorage.getItem(HOUSES_KEY) || '["Casa"]');

  const houses = [...new Set([...fromStorage, ...fromItems])]
    .filter(Boolean)
    .sort((a,b) => a.localeCompare(b, "es"));

  return houses.length ? houses : ["Casa"];
}

function saveHouses(houses){
  localStorage.setItem(HOUSES_KEY, JSON.stringify(houses));
}

function ensureHouseExists(name){
  const clean = (name || "").trim();
  if(!clean) return;

  const houses = getHouses();
  if(!houses.some(h => h.toLowerCase() === clean.toLowerCase())){
    saveHouses([...houses, clean]);
  }
}
  
function saveActiveHouse(){
  localStorage.setItem(ACTIVE_HOUSE_KEY, activeHouse);
}

function loadActiveHouse(){
  activeHouse = localStorage.getItem(ACTIVE_HOUSE_KEY) || "Casa";
}

function changeHouse(){
  activeHouse = qs("activeHouse").value || "Casa";
  saveActiveHouse();
  render();
}

function createHouse(){
  const name = prompt("Nombre de la nueva casa:");
  if(!name) return;

  const clean = name.trim();
  if(!clean) return;

  ensureHouseExists(clean);

  const houses = getHouses();
  activeHouse = houses.find(h => h.toLowerCase() === clean.toLowerCase()) || clean;

  saveActiveHouse();
  render();
}

function getVisibleItems(){
  return items.filter(x => (x.house || "Casa") === activeHouse);
}

function inferStatus(x){
  if (x.status === "Comprar") return "Comprar";

  if (x.lastBought && x.durationDays){
    const used = Math.floor((new Date() - new Date(x.lastBought)) / 86400000);
    const duration = Number(x.durationDays);

    if (!isNaN(used) && duration > 0) {
      if (used >= duration) return "Comprar";
      if (used >= duration * 0.8) return "Revisar";
    }
  }

  return "OK";
}

function saveCache(){
  localStorage.setItem(CACHE_KEY, JSON.stringify(items));
  localStorage.setItem(SYNC_KEY, new Date().toISOString());
}

function loadCache(){
  try{
    const raw = localStorage.getItem(CACHE_KEY);
    if(!raw) return false;
    const parsed = JSON.parse(raw);
    if(!Array.isArray(parsed)) return false;
    items = parsed.map(normalizeItem);
    render();
    return true;
  }catch(e){
    return false;
  }
}

async function api(payload, method = "GET"){
  let res;

  if(method === "GET"){
    res = await fetch(ENDPOINT + "?action=list&t=" + Date.now(), { cache: "no-store" });
  } else {
    res = await fetch(ENDPOINT, {
      method: "POST",
      headers: { "Content-Type":"text/plain;charset=utf-8" },
      body: JSON.stringify(payload)
    });
  }

  if(!res.ok) throw new Error("HTTP " + res.status);
  return await res.json();
}

function updateHouseSelectors(){
  const houses = getHouses();
  qs("activeHouse").innerHTML = houses.map(h => `<option value="${esc(h)}">${esc(h)}</option>`).join("");
  if(!houses.includes(activeHouse)) activeHouse = houses[0];
  qs("activeHouse").value = activeHouse;

  if(qs("editHouse")){
    qs("editHouse").innerHTML = houses.map(h => `<option value="${esc(h)}">${esc(h)}</option>`).join("");
  }
}

function updateCategoryList(){
  const categories = [...new Set(
    getVisibleItems().map(x => (x.category || "").trim()).filter(Boolean)
  )].sort((a,b) => a.localeCompare(b, "es"));

  qs("categoryList").innerHTML =
    categories.map(c => `<option value="${esc(c)}">`).join("");

  if(qs("filterCategory")){
    const currentValue = qs("filterCategory").value || "";
    qs("filterCategory").innerHTML =
      `<option value="">Todas las categorías</option>` +
      categories.map(c => `<option value="${esc(c)}">${esc(c)}</option>`).join("");

    qs("filterCategory").value = categories.includes(currentValue) ? currentValue : "";
  }
}

function findSimilarProducts(text){
  const t = text.toLowerCase().trim();
  if(!t) return [];
  return getVisibleItems().filter(x => (x.name || "").toLowerCase().includes(t));
}

function focusProduct(id){
  showTab("productos");
  setTimeout(() => {
    const el = document.querySelector(`[data-id="${id}"]`);
    if(!el) return;
    el.scrollIntoView({ behavior: "smooth", block: "center" });
    const old = el.style.boxShadow;
    el.style.boxShadow = "0 0 0 3px #7ad1cf";
    setTimeout(() => { el.style.boxShadow = old; }, 1500);
  }, 80);
}

function updateSuggestions(){
  const val = qs("name").value.trim();
  const box = qs("suggestions");

  if(!val){
    box.innerHTML = "";
    return;
  }

  const matches = findSimilarProducts(val).slice(0,5);

  if(matches.length > 0){
    box.innerHTML = matches.map(x => `
      <div class="suggestion" onclick="focusProduct('${x.id}')">
        Ya existe en ${esc(activeHouse)}: ${esc(x.name)}
      </div>
    `).join("");
  } else {
    box.innerHTML = `
      <div class="suggestion" onclick="createFromInput()">
        ➕ Crear "${esc(val)}" en ${esc(activeHouse)}
      </div>
    `;
  }
}

function createFromInput(){
  const name = qs("name").value.trim();
  if(!name) return;

  qs("category").focus();
  addItem();
}  

function categorySortValue(cat){
  const normalized = (cat || "Otros").trim();
  const idx = CATEGORY_ORDER.findIndex(x => x.toLowerCase() === normalized.toLowerCase());
  return idx === -1 ? 999 : idx;
}

function renderShoppingCompact(){
  const grouped = {};
  const visible = getVisibleItems();

  visible.forEach(x => {
    const st = inferStatus(x);
    if(st === "OK") return;
    const cat = (x.category || "Otros").trim() || "Otros";
    if(!grouped[cat]) grouped[cat] = [];
    grouped[cat].push(x);
  });

  const categories = Object.keys(grouped).sort((a,b) => {
    const diff = categorySortValue(a) - categorySortValue(b);
    return diff !== 0 ? diff : a.localeCompare(b, "es");
  });

  if(categories.length === 0){
    qs("shopping").innerHTML = `<div class="empty">No hay nada pendiente en ${esc(activeHouse)}.</div>`;
    return;
  }

  qs("shopping").innerHTML = categories.map(cat => {
    const products = grouped[cat].slice().sort((a,b) => a.name.localeCompare(b.name, "es"));

    return `
      <div class="group-card">
        <div class="group-head">${esc(cat)}</div>
        ${products.map(x => `
          <div class="shop-row">
            <div>
              <div class="shop-name">${esc(x.name)}</div>
              <div class="shop-state">${inferStatus(x)}</div>
            </div>
            <button class="btn-primary" style="width:auto;" onclick="markBoughtFast('${esc(x.id)}')">Comprado</button>
          </div>
        `).join("")}
      </div>
    `;
  }).join("");
}

function itemHtml(x){
  const st = inferStatus(x);

  const isBuy = st === "Comprar" || st === "Revisar";
  const nameClass = isBuy ? "buy" : "ok";

  const button = isBuy
    ? `<button class="btn-buy" style="width:auto;font-size:18px;"
         onclick="event.stopPropagation(); markBoughtFast('${esc(x.id)}')">
         🛒
       </button>`
    : `<button class="btn-soft" style="width:auto;font-size:18px;"
         onclick="event.stopPropagation(); setStatusFast('${esc(x.id)}','Comprar')">
         ✔
       </button>`;

  return `
    <div class="item-card" data-id="${x.id}" onclick="openEditModal('${esc(x.id)}')">
      <div style="display:flex; justify-content:space-between; align-items:center;">
        <div class="item-name ${nameClass}">
          ${esc(x.name)}
        </div>
        ${button}
      </div>
    </div>
  `;
}
  
function render(){
  updateHouseSelectors();
  updateCategoryList();
  renderShoppingCompact();

  const visible = getVisibleItems();
  const search = (qs("searchProducts")?.value || "").trim().toLowerCase();
  const filterCat = qs("filterCategory")?.value || "";

  const filtered = visible
    .filter(x =>
      (!search || `${x.name} ${x.category}`.toLowerCase().includes(search)) &&
      (!filterCat || (x.category || "") === filterCat)
    )
    .slice()
    .sort((a,b) => a.name.localeCompare(b.name, "es"));

  if(filtered.length === 0 && search){
    qs("all").innerHTML = `
      <div class="empty">
        No existe "${esc(search)}"<br><br>
        <button class="btn-primary" onclick="createFromSearch('${esc(search)}')">
          Crear producto
        </button>
      </div>
    `;
    return;
  }

  if(filtered.length === 0){
    qs("all").innerHTML = `<div class="empty">No hay productos en ${esc(activeHouse)}.</div>`;
    return;
  }

  const grouped = {};

  filtered.forEach(x => {
    const cat = (x.category || "Otros").trim() || "Otros";
    if(!grouped[cat]) grouped[cat] = [];
    grouped[cat].push(x);
  });

  const categories = Object.keys(grouped).sort((a,b) => a.localeCompare(b,"es"));

  qs("all").innerHTML = categories.map(cat => `
    <div class="group-card">
      <div class="group-head">${esc(cat)}</div>
      ${grouped[cat].map(itemHtml).join("")}
    </div>
  `).join("");
}

function createFromSearch(text){
  showTab("anadir");
  qs("name").value = text;
  qs("name").focus();
  updateSuggestions();
}
  
function upsertLocal(updated){
  const idx = items.findIndex(x => String(x.id) === String(updated.id));
  if(idx === -1){
    items.unshift(normalizeItem(updated));
  } else {
    items[idx] = normalizeItem({ ...items[idx], ...updated });
  }
  saveCache();
  render();
}

function removeLocal(id){
  items = items.filter(x => String(x.id) !== String(id));
  saveCache();
  render();
}

async function loadItems(showMessage = false){
  try{
    if(showMessage) setStatusMessage("Sincronizando…");
    const data = await api(null, "GET");
    items = (data.items || []).map(normalizeItem);
    saveCache();
    render();
    if(showMessage) setStatusMessage("Sincronizado.", "ok");
  }catch(e){
    if(showMessage) setStatusMessage("Error: " + e.message, "error");
  }
}

async function addItem(){
  const name = qs("name").value.trim();
  if(!name) return alert("Pon un nombre.");

  const visible = getVisibleItems();
  const exactExists = visible.some(x => (x.name || "").trim().toLowerCase() === name.toLowerCase());
  if(exactExists){
    alert("Ese producto ya existe en esta casa.");
    return;
  }

  const tempId = "tmp_" + Date.now();
  ensureHouseExists(activeHouse);
  const tempItem = {
    id: tempId,
    house: activeHouse,
    name,
    category: qs("category").value.trim(),
    durationDays: Number(qs("days").value.trim() || 0),
    mercadonaUrl: qs("murl").value.trim(),
    status: "OK",
    lastBought: "",
    updatedAt: new Date().toISOString()
  };

  upsertLocal(tempItem);
  setStatusMessage("Guardando…");

  try{
    await api({
      action: "add",
      house: tempItem.house,
      name: tempItem.name,
      category: tempItem.category,
      durationDays: tempItem.durationDays,
      mercadonaUrl: tempItem.mercadonaUrl,
      status: "OK",
      lastBought: ""
    }, "POST");

    qs("name").value = "";
    qs("category").value = "";
    qs("days").value = "";
    qs("murl").value = "";
    qs("suggestions").innerHTML = "";

    setStatusMessage("Producto añadido.", "ok");
    loadItems(false);
  }catch(e){
    removeLocal(tempId);
    setStatusMessage("Error al guardar: " + e.message, "error");
  }
}

async function setStatusFast(id, status){
  const prev = items.find(x => String(x.id) === String(id));
  if(!prev) return;

  const backup = { ...prev };
  upsertLocal({ ...prev, status });

  try{
    await api({ action:"update", id:String(id), status:String(status) }, "POST");
    setStatusMessage("Estado actualizado.", "ok");
    loadItems(false);
  }catch(e){
    upsertLocal(backup);
    setStatusMessage("Error al actualizar: " + e.message, "error");
  }
}

async function markBoughtFast(id){
  const prev = items.find(x => String(x.id) === String(id));
  if(!prev) return;

  const backup = { ...prev };
  upsertLocal({ ...prev, status:"OK", lastBought:todayStr() });

  try{
    await api({ action:"update", id:String(id), status:"OK", lastBought:todayStr() }, "POST");
    setStatusMessage("Compra guardada.", "ok");
    loadItems(false);
  }catch(e){
    upsertLocal(backup);
    setStatusMessage("Error al guardar la compra: " + e.message, "error");
  }
}

async function removeItemFast(id){
  if(!confirm("¿Borrar este producto?")) return;

  const prev = items.find(x => String(x.id) === String(id));
  if(!prev) return;

  removeLocal(id);

  try{
    await api({ action:"delete", id:String(id) }, "POST");
    setStatusMessage("Producto borrado.", "ok");
    loadItems(false);
  }catch(e){
    upsertLocal(prev);
    setStatusMessage("Error al borrar: " + e.message, "error");
  }
}



function parseBulkText(text){
  const lines = text.split("\n").map(x => x.trim()).filter(Boolean);

  return lines.map(line => {
    const parts = line.split("|").map(x => x.trim());
    if(parts.length === 1){
      return { name: parts[0], category: "", durationDays: "", mercadonaUrl: "" };
    }
    return {
      name: parts[0] || "",
      category: parts[1] || "",
      durationDays: parts[2] || "",
      mercadonaUrl: parts[3] || ""
    };
  }).filter(x => x.name);
}

async function bulkImport(){
  const text = qs("bulkText").value.trim();
  if(!text) return alert("Pega primero una lista.");

  const rows = parseBulkText(text);
  if(!rows.length) return alert("No hay líneas válidas.");

  if(!confirm(`Se van a importar ${rows.length} productos en ${activeHouse}. ¿Continuar?`)) return;

  setStatusMessage("Importando " + rows.length + " productos…");

  let okCount = 0;
  let failCount = 0;

  for(const row of rows){
    try{
      const exists = getVisibleItems().some(x => (x.name || "").trim().toLowerCase() === row.name.toLowerCase());
      if(exists) continue;

      await api({
        action: "add",
        house: activeHouse,
        name: row.name,
        category: row.category,
        durationDays: row.durationDays,
        mercadonaUrl: row.mercadonaUrl,
        status: "OK",
        lastBought: ""
      }, "POST");
      okCount++;
    }catch(e){
      failCount++;
    }
  }

  qs("bulkText").value = "";
  await loadItems(false);

  if(failCount === 0){
    setStatusMessage(`Importación completada: ${okCount} productos.`, "ok");
  } else {
    setStatusMessage(`Importación parcial: ${okCount} correctos, ${failCount} con error.`, "error");
  }
}

function openEditModal(id){
  const item = items.find(x => String(x.id) === String(id));
  if(!item) return;

  editingId = item.id;
  qs("editName").value = item.name || "";
  qs("editCategory").value = item.category || "";
  qs("editDays").value = item.durationDays || "";
  qs("editUrl").value = item.mercadonaUrl || "";
  qs("editHouse").innerHTML = getHouses().map(h => `<option value="${esc(h)}">${esc(h)}</option>`).join("");
  qs("editHouse").value = item.house || "Casa";
  qs("editStatusReadonly").value = inferStatus(item);

  qs("editStatusInfo").innerHTML = `
    <span class="chip ${inferStatus(item) === 'Comprar' ? 'buy' : inferStatus(item) === 'Revisar' ? 'review' : 'ok'}">${inferStatus(item)}</span>
    <span class="chip">Casa: ${esc(item.house || 'Casa')}</span>
    <span class="chip">Última compra: ${formatDate(item.lastBought)}</span>
  `;
  qs("editModalBackdrop").classList.add("open");
}

function closeEditModal(event){
  if(event.target.id === "editModalBackdrop"){
    forceCloseEditModal();
  }
}

function forceCloseEditModal(){
  editingId = null;
  qs("editModalBackdrop").classList.remove("open");
}

async function saveEdit(){
  if(!editingId) return;

  const newName = qs("editName").value.trim();
  const newHouse = qs("editHouse").value.trim() || "Casa";

  const existing = items.find(x =>
    String(x.id) !== String(editingId) &&
    (x.house || "Casa").trim().toLowerCase() === newHouse.toLowerCase() &&
    (x.name || "").trim().toLowerCase() === newName.toLowerCase()
  );

  if(existing){
    alert("Ya existe otro producto con ese nombre en esa casa.");
    return;
  }

  const prev = items.find(x => String(x.id) === String(editingId));
  if(!prev) return;

  ensureHouseExists(newHouse);
  
  const updated = {
    ...prev,
    house: newHouse,
    name: newName,
    category: qs("editCategory").value.trim(),
    durationDays: Number(qs("editDays").value.trim() || 0),
    mercadonaUrl: qs("editUrl").value.trim()
  };

  upsertLocal(updated);

  try{
    await api({
      action:"update",
      id:String(editingId),
      house:updated.house,
      name:updated.name,
      category:updated.category,
      durationDays:updated.durationDays,
      mercadonaUrl:updated.mercadonaUrl
    }, "POST");
    setStatusMessage("Producto actualizado.", "ok");
    forceCloseEditModal();
    loadItems(false);
  }catch(e){
    upsertLocal(prev);
    setStatusMessage("Error al actualizar: " + e.message, "error");
  }
}

async function markBoughtFromEdit(){
  if(!editingId) return;
  await markBoughtFast(editingId);
  forceCloseEditModal();
}

async function markNeedFromEdit(){
  if(!editingId) return;
  await setStatusFast(editingId, "Comprar");
  forceCloseEditModal();
}

async function deleteFromEdit(){
  if(!editingId) return;
  const id = editingId;
  forceCloseEditModal();
  await removeItemFast(id);
}

qs("name").addEventListener("input", updateSuggestions);

(function init(){
  loadActiveHouse();

  if(!localStorage.getItem(HOUSES_KEY)){
    localStorage.setItem(HOUSES_KEY, JSON.stringify(["Casa"]));
  }

  const hadCache = loadCache();
  if(hadCache){
    setStatusMessage("Cargado desde cache local. Sincronizando al fondo…");
  } else {
    setStatusMessage("Cargando…");
    render();
  }

  loadItems(!hadCache);
})();
</script>
