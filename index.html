<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Compra Mercadona</title>
  <meta name="theme-color" content="#0f172a" />
  <style>
    :root{
      --bg:#f6f7fb;
      --card:#ffffff;
      --text:#0f172a;
      --muted:#64748b;
      --line:#e2e8f0;
      --primary:#0f172a;
      --ok:#e8f7ee;
      --low:#fff4d8;
      --buy:#ffe3e3;
      --shadow:0 8px 24px rgba(15,23,42,.08);
      --radius:20px;
    }
    *{box-sizing:border-box}
    html,body{
      margin:0;
      padding:0;
      background:var(--bg);
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,Arial,sans-serif
    }
    body{padding:18px}
    .wrap{max-width:860px;margin:0 auto}
    .hero{display:grid;grid-template-columns:1.5fr 1fr;gap:14px;margin-bottom:14px}
    .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
    .p16{padding:16px}
    .p20{padding:20px}
    h1{font-size:28px;line-height:1.05;margin:0 0 6px}
    .sub{color:var(--muted);font-size:14px}
    .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:14px}
    .stat{border:1px solid var(--line);border-radius:16px;padding:12px;background:#fff}
    .stat .k{font-size:12px;color:var(--muted)}
    .stat .v{font-size:28px;font-weight:700;margin-top:4px}
    .title{font-size:18px;font-weight:700;margin:0 0 12px}
    .grid{display:grid;gap:10px}
    .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    input, select, button{
      width:100%;
      border-radius:14px;
      border:1px solid var(--line);
      padding:13px 14px;
      font:inherit;
      background:#fff;
      color:var(--text);
    }
    button{
      cursor:pointer;
      font-weight:600;
      transition:.15s transform ease;
    }
    button:active{transform:scale(.99)}
    .btn-primary{background:var(--primary);border-color:var(--primary);color:#fff}
    .btn-low{background:#fff7e6}
    .btn-buy{background:#fff0f0}
    .toolbar{display:grid;grid-template-columns:1fr auto auto;gap:10px}
    .toolbar button{width:auto;min-width:110px}
    .section{margin-top:14px}
    .section-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
    .section-head h2{font-size:18px;margin:0}
    .section-head .hint{font-size:13px;color:var(--muted)}
    .list{display:grid;gap:10px}
    .item{display:grid;grid-template-columns:1fr auto;gap:12px;padding:14px}
    .name{font-weight:700;font-size:16px}
    .meta{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
    .chip{font-size:12px;padding:6px 10px;border-radius:999px;border:1px solid var(--line);background:#fff}
    .chip.ok{background:var(--ok)}
    .chip.low{background:var(--low)}
    .chip.buy{background:var(--buy)}
    .actions{display:flex;flex-wrap:wrap;gap:8px;align-content:flex-start;justify-content:flex-end}
    .actions button{width:auto;padding:10px 12px}
    .muted{color:var(--muted)}
    .empty{padding:24px;text-align:center;color:var(--muted)}
    .statusline{font-size:13px;color:var(--muted);min-height:18px;margin-top:8px}
    a.link{color:#0f766e;text-decoration:none}
    .footer-note{margin-top:14px;font-size:12px;color:var(--muted);text-align:center}
    @media (max-width: 760px){
      body{padding:12px}
      .hero,.grid2,.toolbar,.item{grid-template-columns:1fr}
      .actions{justify-content:stretch}
      .actions button,.toolbar button{width:100%}
      h1{font-size:24px}
      .stats{grid-template-columns:repeat(3,1fr)}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <div class="card p20">
        <h1>Compra Mercadona</h1>
        <div class="sub">Lista sincronizada para iPhone y ordenador.</div>
        <div class="stats">
          <div class="stat"><div class="k">Productos</div><div class="v" id="statTotal">0</div></div>
          <div class="stat"><div class="k">Comprar</div><div class="v" id="statBuy">0</div></div>
          <div class="stat"><div class="k">Poco</div><div class="v" id="statLow">0</div></div>
        </div>
      </div>
      <div class="card p16">
        <div class="title">Conexión</div>
        <div class="grid">
          <input id="endpoint" value="https://script.google.com/macros/s/AKfycbzi6WZp6g42qZOmQUcH22ro7lwQw5vp2Jy4rWo_fIEKKXLSjKy-CeyhWhAR7sMq6Woy8Q/exec" readonly />
          <div class="grid2">
            <button class="btn-primary" onclick="loadItems()">Sincronizar</button>
            <button onclick="copyUrl()">Copiar URL</button>
          </div>
        </div>
        <div class="statusline" id="status"></div>
      </div>
    </div>

    <div class="card p16">
      <div class="title">Añadir producto</div>
      <div class="grid2">
        <input id="name" placeholder="Nombre del producto" />
        <input id="category" placeholder="Categoría" />
      </div>
      <div class="grid2" style="margin-top:10px">
        <input id="days" type="number" placeholder="Duración estimada en días" />
        <input id="murl" placeholder="Link de Mercadona (opcional)" />
      </div>
      <div style="margin-top:10px">
        <button class="btn-primary" onclick="addItem()">Guardar producto</button>
      </div>
    </div>

    <div class="section">
      <div class="section-head">
        <h2>Compra rápida</h2>
        <div class="hint">Ideal para móvil y NFC</div>
      </div>
      <div class="card p16">
        <div class="toolbar">
          <select id="quick"></select>
          <button class="btn-low" onclick="quickStatus('Poco')">Poco</button>
          <button class="btn-buy" onclick="quickStatus('Comprar')">Comprar</button>
        </div>
        <div style="margin-top:10px">
          <button class="btn-primary" onclick="quickBought()">Comprado</button>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="section-head">
        <h2>Lista de compra</h2>
        <div class="hint">Solo lo pendiente</div>
      </div>
      <div class="list" id="shopping"></div>
    </div>

    <div class="section">
      <div class="section-head">
        <h2>Todos los productos</h2>
        <div class="hint">Histórico y control</div>
      </div>
      <div class="list" id="all"></div>
    </div>

    <div class="footer-note">Los datos se guardan en Google Sheets.</div>
  </div>

<script>
const ENDPOINT = "https://script.google.com/macros/s/AKfycbzi6WZp6g42qZOmQUcH22ro7lwQw5vp2Jy4rWo_fIEKKXLSjKy-CeyhWhAR7sMq6Woy8Q/exec";
let items = [];

function qs(id){ return document.getElementById(id); }
function statusMsg(t){ qs("status").textContent = t || ""; }

function formatDate(v){
  if(!v) return "—";
  const d = new Date(v);
  return isNaN(d) ? v : d.toLocaleDateString("es-ES");
}

function todayStr(){
  return new Date().toISOString().slice(0,10);
}

function inferStatus(x){
  if (x.status === "Comprar" || x.status === "Poco") return x.status;
  if (x.lastBought && x.durationDays){
    const used = Math.floor((new Date() - new Date(x.lastBought)) / 86400000);
    if (used >= Number(x.durationDays)) return "Comprar";
    if (used >= Number(x.durationDays) * 0.8) return "Poco";
  }
  return "OK";
}

function esc(s){
  return (s || "").replace(/[&<>"']/g, m => ({
    "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"
  }[m]));
}

function copyUrl(){
  navigator.clipboard.writeText(ENDPOINT);
  statusMsg("URL copiada.");
}

async function api(payload, method="GET"){
  let res;

  if(method === "GET"){
    res = await fetch(ENDPOINT + "?action=list");
  } else {
    res = await fetch(ENDPOINT, {
      method: "POST",
      headers: { "Content-Type":"text/plain;charset=utf-8" },
      body: JSON.stringify(payload)
    });
  }

  return await res.json();
}

function render(){
  qs("statTotal").textContent = items.length;
  qs("statBuy").textContent = items.filter(x => inferStatus(x) === "Comprar").length;
  qs("statLow").textContent = items.filter(x => inferStatus(x) === "Poco").length;

  const shopping = items.filter(x => ["Comprar","Poco"].includes(inferStatus(x)));
  qs("shopping").innerHTML = shopping.length
    ? shopping.map(itemHtml).join("")
    : `<div class="card empty">No hay nada pendiente.</div>`;

  qs("all").innerHTML = items.length
    ? items.map(itemHtml).join("")
    : `<div class="card empty">No hay productos todavía.</div>`;

  qs("quick").innerHTML =
    `<option value="">Selecciona un producto…</option>` +
    items.map(x => `<option value="${esc(String(x.id))}">${esc(x.name)}</option>`).join("");
}

function itemHtml(x){
  const st = inferStatus(x);
  const css = st === "Comprar" ? "buy" : st === "Poco" ? "low" : "ok";

  return `
    <div class="card item">
      <div>
        <div class="name">${esc(x.name)}</div>
        <div class="meta">
          <span class="chip ${css}">${st}</span>
          <span class="chip">${esc(x.category || "Sin categoría")}</span>
          <span class="chip">Última compra: ${formatDate(x.lastBought)}</span>
          <span class="chip">Duración: ${x.durationDays || "—"} días</span>
          ${x.mercadonaUrl ? `<a class="chip link" href="${esc(x.mercadonaUrl)}" target="_blank" rel="noreferrer">Mercadona</a>` : ""}
        </div>
      </div>
      <div class="actions">
        <button class="btn-low" onclick="setStatus('${esc(String(x.id))}','Poco')">Poco</button>
        <button class="btn-buy" onclick="setStatus('${esc(String(x.id))}','Comprar')">Comprar</button>
        <button class="btn-primary" onclick="markBought('${esc(String(x.id))}')">Comprado</button>
        <button onclick="removeItem('${esc(String(x.id))}')">Borrar</button>
      </div>
    </div>
  `;
}

async function loadItems(){
  try{
    statusMsg("Sincronizando…");
    const data = await api(null, "GET");
    items = (data.items || []).map(x => ({
      ...x,
      durationDays: Number(x.durationDays || 0)
    }));
    render();
    statusMsg("Sincronizado.");
  }catch(e){
    statusMsg("Error: " + e.message);
  }
}

async function addItem(){
  const name = qs("name").value.trim();
  if(!name) return alert("Pon un nombre.");

  try{
    statusMsg("Guardando…");
    await api({
      action: "add",
      name,
      category: qs("category").value.trim(),
      durationDays: qs("days").value.trim(),
      mercadonaUrl: qs("murl").value.trim(),
      status: "OK",
      lastBought: ""
    }, "POST");

    qs("name").value = "";
    qs("category").value = "";
    qs("days").value = "";
    qs("murl").value = "";

    await loadItems();
  }catch(e){
    statusMsg("Error: " + e.message);
  }
}

async function setStatus(id, status){
  try{
    statusMsg("Actualizando…");
    await api({ action:"update", id, status }, "POST");
    await loadItems();
  }catch(e){
    statusMsg("Error: " + e.message);
  }
}

async function markBought(id){
  try{
    statusMsg("Guardando compra…");
    await api({ action:"update", id, status:"OK", lastBought:todayStr() }, "POST");
    await loadItems();
  }catch(e){
    statusMsg("Error: " + e.message);
  }
}

async function removeItem(id){
  if(!confirm("¿Borrar este producto?")) return;

  try{
    statusMsg("Borrando…");
    await api({ action:"delete", id }, "POST");
    await loadItems();
  }catch(e){
    statusMsg("Error: " + e.message);
  }
}

async function quickStatus(status){
  const id = qs("quick").value;
  if(!id) return alert("Selecciona un producto.");
  await setStatus(id, status);
}

async function quickBought(){
  const id = qs("quick").value;
  if(!id) return alert("Selecciona un producto.");
  await markBought(id);
}

loadItems();
</script>
</body>
</html>
